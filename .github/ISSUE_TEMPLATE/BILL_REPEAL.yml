name: "Law Repeal Proposal"
description: "Propose the repeal of an existing senate law"
title: "[BILL-REPEAL] "
labels: ["bill", "repeal", "needs-triage"]
body:
  - type: input
    id: target_law
    attributes:
      label: Target Law
      description: "The LAW-NNN identifier of the law to repeal"
      placeholder: "LAW-005"
    validations:
      required: true
  - type: input
    id: sponsor
    attributes:
      label: Sponsor
      description: "The constituent project sponsoring this repeal"
      placeholder: "kescott027/netdata"
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: "Why should this law be repealed?"
      placeholder: "Explain why the law is no longer needed or is harmful..."
    validations:
      required: true
  - type: textarea
    id: replacement
    attributes:
      label: Replacement
      description: "If applicable, describe what replaces this law"
      placeholder: "Describe any replacement governance or leave blank if none"
    validations:
      required: false
