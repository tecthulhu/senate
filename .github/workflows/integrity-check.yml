name: Integrity Check

on:
  push:
    branches: [main]
    paths:
      - 'bootstrap/initiator.md'
      - 'bootstrap/integrity.json'
      - 'laws/active/**'
      - 'CONSTITUTION.md'
      - 'MEMBERSHIP.md'
      - 'project_management_skeleton/**'
      - 'project_management_bootstrapping.md'
      - 'project_management_bootstrapping_existing.md'
      - 'BOOTSTRAP.md'
      - 'sync/manifest.json'
  pull_request:
    paths:
      - 'bootstrap/initiator.md'
      - 'bootstrap/integrity.json'
      - 'laws/active/**'
      - 'CONSTITUTION.md'
      - 'MEMBERSHIP.md'
      - 'project_management_skeleton/**'
      - 'project_management_bootstrapping.md'
      - 'project_management_bootstrapping_existing.md'
      - 'BOOTSTRAP.md'
      - 'sync/manifest.json'

permissions:
  contents: read

jobs:
  verify-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify integrity manifest
        run: ./bootstrap/regenerate-integrity.sh --check-only

      - name: Verify manifest law hashes
        run: python3 scripts/verify_manifest_hashes.py

  auto-regenerate:
    runs-on: ubuntu-latest
    needs: verify-integrity
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate integrity.json
        run: ./bootstrap/regenerate-integrity.sh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet bootstrap/integrity.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated integrity.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bootstrap/integrity.json
          git commit -m "chore: regenerate integrity.json [automated]"
          git push
